<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Customer details form for cleaning services."
    />
    <title>Cleaning Services | Customer Details</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"
    ></script>
    <link rel="stylesheet" href="assets/css/layout/header.css" />
    <link rel="stylesheet" href="assets/css/layout/footer.css" />
    <link rel="stylesheet" href="assets/css/pages/customer-details.css" />
  </head>

  <body>
    <div
      class="page-loader"
      id="page-loader"
      aria-live="polite"
      aria-label="Loading page"
    >
      <img
        src="assets/images/colorLogo.png"
        alt="Loading logo"
        class="loader-logo"
      />
    </div>

    <div id="header-placeholder"></div>

    <main class="customer-details-page">
      <div class="customer-form-container">
        <div class="text-center mb-4">
          <div class="logo-circle">
            <img
              src="assets/images/colorLogo.png"
              alt="Company Logo"
              class="logo-img"
            />
          </div>
          <h1 class="page-title">Create Account</h1>
          <p class="page-subtitle">Join us and get started in minutes</p>
        </div>

        <section class="customer-details-card">
          <div class="text-center mb-4">
            <h2 class="card-title">Tell us about yourself</h2>
            <p class="card-subtitle">Help us personalize your experience</p>
          </div>

          <form id="customerDetailsForm" novalidate>
            <div class="mb-2">
              <label class="form-label" for="customerName">Full Name</label>
              <div class="input-group-custom">
                <i class="bi bi-person prefix-icon" aria-hidden="true"></i>
                <input
                  id="customerName"
                  class="form-control"
                  type="text"
                  autocomplete="name"
                  placeholder="Enter your full name"
                  required
                />
              </div>
            </div>

            <div class="mb-2">
              <label class="form-label" for="customerAddress">Address</label>
              <div class="input-group-custom">
                <i class="bi bi-building prefix-icon" aria-hidden="true"></i>
                <input
                  id="customerAddress"
                  class="form-control"
                  type="text"
                  autocomplete="street-address"
                  placeholder="Enter your address"
                  required
                />
              </div>
            </div>

            <div class="mb-2">
              <label class="form-label" for="customerPhone">Phone Number</label>
              <div class="input-group-custom">
                <i class="bi bi-phone prefix-icon" aria-hidden="true"></i>
                <input
                  id="customerPhone"
                  class="form-control"
                  type="tel"
                  inputmode="tel"
                  autocomplete="tel"
                  placeholder="+880 000-000-0000"
                  required
                />
              </div>
            </div>

            <label class="terms-wrap mb-4" for="termsCheck">
              <input id="termsCheck" type="checkbox" required />
              <span>
                I agree to the
                <a href="#">Terms of Service</a>
                and
                <a href="#">Privacy Policy</a>
              </span>
            </label>
            <button type="submit" class="btn-continue">
              Continue <i class="bi bi-arrow-right"></i>
            </button>
          </form>
        </section>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/core/components-loader.js"></script>
    <script src="assets/js/core/app.js"></script>
  </body>
</html>
