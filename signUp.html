<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Professional cleaning services for your home and office."
    />
    <title>Cleaning Services | Sign Up</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"
    ></script>
    <link rel="stylesheet" href="assets/css/layout/header.css" />
    <link rel="stylesheet" href="assets/css/layout/footer.css" />
    <link rel="stylesheet" href="assets/css/pages/signup.css" />
  </head>

  <body>
    <div
      class="page-loader"
      id="page-loader"
      aria-live="polite"
      aria-label="Loading page"
    >
      <img
        src="assets/images/colorLogo.png"
        alt="Loading logo"
        class="loader-logo"
      />
    </div>

    <div id="header-placeholder"></div>
    <div class="signup-page">
      <div class="form-container">
        <div class="text-center mb-4">
          <!-- <div class="logo-circle">
            <img src="assets/images/colorLogo.png" alt=" logo" />
          </div> -->
          <h1 class="create-account-title" id="signupHeroTitle">
            Create Account
          </h1>
          <p class="create-account-subtitle" id="signupHeroSubtitle">
            Join us and get started in minutes
          </p>
        </div>

        <div class="signup-card">
          <div class="text-center mb-4">
            <h2 class="signup-card-title" id="signupCardTitle">
              Choose signup method
            </h2>
            <p class="signup-card-subtitle" id="signupCardSubtitle">
              Select how you'd like to create your account
            </p>
          </div>

          <div
            class="toggle-container mb-4"
            role="tablist"
            aria-label="Signup method"
          >
            <div class="toggle-slider" id="slider"></div>
            <button
              type="button"
              class="toggle-btn active"
              id="btn-mobile"
              data-signup-method="mobile"
              role="tab"
              aria-selected="true"
            >
              <i class="bi bi-phone"></i> Mobile
            </button>
            <button
              type="button"
              class="toggle-btn"
              id="btn-email"
              data-signup-method="email"
              role="tab"
              aria-selected="false"
            >
              <i class="bi bi-envelope"></i> Email
            </button>
          </div>

          <form id="authForm" novalidate>
            <div class="mb-1">
              <label class="form-label" id="dynamicLabel" for="dynamicInput"
                >Email</label
              >
              <div class="input-group-custom">
                <i class="bi bi-envelope prefix-icon" id="dynamicIcon"></i>
                <input
                  type="email"
                  id="dynamicInput"
                  class="form-control"
                  placeholder="you@example.com"
                  required
                />
              </div>
              <p class="sms-help-text" id="signupMobileHelpText" hidden>
                We'll send you a verification code via SMS
              </p>
            </div>

            <div class="mb-1" id="passwordGroup">
              <label class="form-label">Password</label>
              <div class="input-group-custom">
                <i class="bi bi-lock prefix-icon"></i>
                <input
                  type="password"
                  id="passwordInput"
                  class="form-control"
                  placeholder="Enter your password"
                  required
                />
                <button
                  type="button"
                  class="suffix-btn"
                  id="signupPasswordToggleBtn"
                  aria-label="Show password"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <div class="mb-1" id="confirmPasswordGroup">
              <label class="form-label">Confirm Password</label>
              <div class="input-group-custom">
                <i class="bi bi-lock prefix-icon"></i>
                <input
                  type="password"
                  id="confirmPasswordInput"
                  class="form-control"
                  placeholder="Re-enter your password"
                  required
                />
                <button
                  type="button"
                  class="suffix-btn"
                  id="signupConfirmPasswordToggleBtn"
                  aria-label="Show password"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-continue">
              Continue <i class="bi bi-arrow-right"></i>
            </button>
          </form>

          <div class="divider-container">
            <span class="divider-text">Or continue with</span>
          </div>

          <button type="button" class="btn-google">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill="#EA4335"
                d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.63 15.03 1 12 1 7.24 1 3.2 3.74 1.25 7.71l3.8 2.95C6.01 7.42 8.78 5.04 12 5.04z"
              />
              <path
                fill="#4285F4"
                d="M23.49 12.27c0-.81-.07-1.59-.2-2.34H12v4.44h6.44c-.28 1.47-1.11 2.72-2.36 3.56l3.66 2.84c2.14-1.98 3.39-4.89 3.39-8.5z"
              />
              <path
                fill="#FBBC05"
                d="M5.05 10.66c-.25-.74-.39-1.53-.39-2.34s.14-1.6.39-2.34L1.25 7.03C.45 8.63 0 10.39 0 12.23s.45 3.6 1.25 5.2l3.8-2.97c-.25-.74-.39-1.53-.39-2.34z"
              />
              <path
                fill="#34A853"
                d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.66-2.84c-1.01.68-2.31 1.09-4.3 1.09-3.22 0-5.99-2.38-6.96-5.62l-3.8 2.95C3.2 20.26 7.24 23 12 23z"
              />
            </svg>
            Sign in Google
          </button>

          <div class="account-text">
            Already have an account?
            <a href="login.html" class="brand-color">Sign In</a>
          </div>
        </div>
      </div>
    </div>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/core/components-loader.js"></script>
    <script src="assets/js/core/app.js"></script>
  </body>
</html>
